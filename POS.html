<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "FIREBASE_API_KEY",
            authDomain: "finance-dashboard-11987.firebaseapp.com",
            databaseURL: "https://finance-dashboard-11987-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "finance-dashboard-11987",
            storageBucket: "finance-dashboard-11987.firebasestorage.app",
            messagingSenderId: "126638893138",
            appId: "1:126638893138:web:cf1a52c27f5375ed99178b",
            measurementId: "G-T46VZFN3WK"
        };

        const app = initializeApp(firebaseConfig);
        const db_fb = getDatabase(app);

        window.fb = { db_fb, ref, set, onValue, push, get };
    </script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .product-btn { transition: all 0.2s; }
        .product-btn:hover { transform: scale(1.05); }
        .cart-item { transition: all 0.2s; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <!-- Loading -->
    <div id="loadingScreen" class="fixed inset-0 bg-slate-950 z-[200] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin mb-4"></div>
        <p class="text-slate-500 font-mono text-xs uppercase tracking-widest">Connecting to POS...</p>
    </div>

    <!-- Login -->
    <div id="authOverlay" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-[400px]">
            <h2 class="text-3xl font-black text-emerald-500 mb-6 italic text-center">POS System</h2>
            <div class="space-y-4">
                <input type="text" id="authUsername" placeholder="Username" class="w-full bg-slate-800 border-none rounded-xl p-4 text-white outline-none focus:ring-2 focus:ring-emerald-500">
                <div class="relative">
                    <input type="password" id="authPass" placeholder="Password" class="w-full bg-slate-800 border-none rounded-xl p-4 text-white outline-none focus:ring-2 focus:ring-emerald-500 pr-12">
                    <button onclick="togglePasswordVisibility()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-emerald-400">
                        👁️
                    </button>
                </div>
                <p id="authError" class="text-rose-500 text-xs font-bold text-center hidden"></p>
                <button onclick="handleAuthAction()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-black uppercase">Open POS</button>
            </div>
        </div>
    </div>

    <!-- Main POS -->
    <div id="mainPOS" class="hidden max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-4xl font-black text-emerald-500 tracking-tighter">POS SYSTEM</h1>
            <div class="flex items-center gap-4">
                <p id="posUserDisplay" class="font-mono text-sm text-slate-400"></p>
                <button onclick="handleLogout()" class="px-6 py-3 bg-rose-600 hover:bg-rose-500 rounded-2xl font-bold text-sm">Logout</button>
            </div>
        </div>

        <!-- Today's Sales - NOW AT THE TOP -->
        <div class="mb-8">
            <h2 class="text-lg font-bold mb-3 text-slate-400">Today's Sales</h2>
            <div id="todaySales" class="bg-slate-900 border border-slate-800 rounded-3xl p-6"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Products -->
            <div class="lg:col-span-8">
                <h2 class="text-lg font-bold mb-4 text-slate-400">Quick Products</h2>
                <div id="productGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
            </div>

            <!-- Cart -->
            <div class="lg:col-span-4 bg-slate-900 border border-slate-800 rounded-3xl p-6 flex flex-col">
                <h2 class="font-bold mb-4">Current Sale</h2>
                <div id="cartItems" class="flex-1 overflow-y-auto space-y-3 mb-6"></div>
                
                <div class="border-t border-slate-700 pt-6">
                    <div class="flex justify-between text-xl font-bold">
                        <span>Total</span>
                        <span id="cartTotal" class="font-mono">₱0.00</span>
                    </div>
                    <button onclick="completeSale()" class="mt-6 w-full bg-emerald-600 hover:bg-emerald-500 py-5 rounded-2xl font-black text-xl uppercase tracking-wider">COMPLETE SALE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let cart = [];
        let db_raw = {};

        const products = [
            { name: "Coffee", price: 50 },
            { name: "Burger", price: 145 },
            { name: "Fries", price: 95 },
            { name: "Pizza Slice", price: 120 },
            { name: "Soft Drink", price: 45 },
            { name: "Sandwich", price: 110 },
            { name: "Ice Cream", price: 65 },
            { name: "Salad", price: 130 }
        ];

        function togglePasswordVisibility() {
            const pass = document.getElementById('authPass');
            pass.type = pass.type === 'password' ? 'text' : 'password';
        }

        async function handleAuthAction() {
            const user = document.getElementById('authUsername').value.trim().toLowerCase();
            const pass = document.getElementById('authPass').value.trim();
            const errEl = document.getElementById('authError');

            if (!user || !pass) return;
            errEl.classList.add('hidden');

            try {
                const userRef = window.fb.ref(window.fb.db_fb, 'users/' + user);
                const snapshot = await window.fb.get(userRef);
                const data = snapshot.val();

                if (!snapshot.exists() || data.password !== pass) throw new Error("Invalid username or password");

                currentUser = user;
                enterPOS();
            } catch (e) {
                errEl.textContent = e.message;
                errEl.classList.remove('hidden');
            }
        }

        function enterPOS() {
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('mainPOS').classList.remove('hidden');
            document.getElementById('posUserDisplay').innerText = `👤 ${currentUser}`;

            renderProducts();
            loadTodaySales();
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            products.forEach(item => {
                const btn = document.createElement('button');
                btn.className = "product-btn bg-slate-800 hover:bg-emerald-900 border border-slate-700 rounded-2xl p-4 text-left";
                btn.innerHTML = `
                    <div class="font-bold">${item.name}</div>
                    <div class="text-emerald-400 font-mono">₱${item.price}</div>
                `;
                btn.onclick = () => addToCart(item);
                grid.appendChild(btn);
            });
        }

        function addToCart(item) {
            const existing = cart.find(i => i.name === item.name);
            if (existing) existing.qty++;
            else cart.push({ ...item, qty: 1 });
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            container.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                const subtotal = item.price * item.qty;
                total += subtotal;

                const div = document.createElement('div');
                div.className = "cart-item flex justify-between items-center bg-slate-800 rounded-2xl p-4";
                div.innerHTML = `
                    <div>
                        <div class="font-medium">${item.name}</div>
                        <div class="text-slate-400 text-sm">₱${item.price} × ${item.qty}</div>
                    </div>
                    <div class="text-right">
                        <div class="font-mono text-emerald-400">₱${subtotal}</div>
                        <button onclick="removeFromCart(${index})" class="text-rose-400 text-xs mt-1">Remove</button>
                    </div>
                `;
                container.appendChild(div);
            });

            document.getElementById('cartTotal').innerHTML = `₱${total}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }

        async function completeSale() {
            if (cart.length === 0) return alert("Cart is empty");

            const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
            const today = new Date().toISOString().split('T')[0];

            const saleEntry = {
                Date: today,
                Category: "POS Sales",
                Amount: total,
                Type: "Profit"
            };

            await window.fb.push(window.fb.ref(window.fb.db_fb, `users/${currentUser}/transactions`), saleEntry);

            alert(`✅ Sale of ₱${total} completed and saved to Finance Dashboard!`);
            
            cart = [];
            renderCart();
            loadTodaySales();
        }

        function loadTodaySales() {
            const container = document.getElementById('todaySales');
            const today = new Date().toISOString().split('T')[0];

            const txRef = window.fb.ref(window.fb.db_fb, `users/${currentUser}/transactions`);
            window.fb.onValue(txRef, (snapshot) => {
                const data = snapshot.val() || {};
                let todayTotal = 0;
                let count = 0;

                Object.values(data).forEach(item => {
                    if (item.Date === today && item.Type === "Profit") {
                        todayTotal += parseFloat(item.Amount) || 0;
                        count++;
                    }
                });

                container.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-slate-400 text-sm">Today’s POS Sales</p>
                            <p class="text-4xl font-black text-emerald-400 font-mono">₱${todayTotal}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-bold">${count} transaction${count !== 1 ? 's' : ''}</p>
                            <p class="text-slate-400 text-xs">Automatically synced to Finance Dashboard</p>
                        </div>
                    </div>
                `;
            });
        }

        function handleLogout() {
            currentUser = null;
            cart = [];
            document.getElementById('mainPOS').classList.add('hidden');
            document.getElementById('authOverlay').classList.remove('hidden');
            document.getElementById('authUsername').value = '';
            document.getElementById('authPass').value = '';
        }

        window.onload = () => {
            document.getElementById('loadingScreen').classList.add('hidden');
        };
    </script>
</body>
</html>
