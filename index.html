<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "FIREBASE_API_KEY",
            authDomain: "finance-dashboard-11987.firebaseapp.com",
            databaseURL: "https://finance-dashboard-11987-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "finance-dashboard-11987",
            storageBucket: "finance-dashboard-11987.firebasestorage.app",
            messagingSenderId: "126638893138",
            appId: "1:126638893138:web:cf1a52c27f5375ed99178b",
            measurementId: "G-T46VZFN3WK"
        };

        const app = initializeApp(firebaseConfig);
        const db_fb = getDatabase(app);

        // Export Firebase to window
        window.fb = { db_fb, ref, set, onValue, push, remove, update, get, child };
        
        // CRITICAL: Signal that Firebase is ready
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <style>
        body { transition: background-color 0.4s ease; }
        .light-mode { background-color: #f1f5f9; }
        .dark-mode { background-color: #020617; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .rate-input { background: transparent; border-bottom: 1px dashed #334155; text-align: center; outline: none; width: 4ch; }
    </style>
</head>
<body class="dark-mode text-slate-100 p-4 md:p-8">

    <div id="loadingScreen" class="fixed inset-0 bg-slate-950 z-[200] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin mb-4"></div>
        <p class="text-slate-500 font-mono text-[10px] uppercase tracking-widest font-bold">Initializing Database...</p>
    </div>

    <div id="authOverlay" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-[400px]">
            <h2 class="text-3xl font-black text-emerald-500 mb-6 italic text-center uppercase tracking-tighter">Finance Analytics</h2>
            <div class="space-y-4">
                <input type="text" id="authUsername" placeholder="Username" class="w-full bg-slate-800 border-none rounded-xl p-4 text-white outline-none focus:ring-2 focus:ring-emerald-500">
                <input type="password" id="authPass" placeholder="Password" class="w-full bg-slate-800 border-none rounded-xl p-4 text-white outline-none focus:ring-2 focus:ring-emerald-500">
                <button onclick="handleAuthAction()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl font-black uppercase transition-all shadow-lg">Login Dashboard</button>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="max-w-6xl mx-auto hidden">
        <header class="flex justify-between items-center mb-8 border-b border-slate-800 pb-6">
            <h1 class="text-3xl font-black text-emerald-500 tracking-tighter italic">Financial Analytics</h1>
            <button onclick="handleLogout()" class="text-xs font-bold text-rose-500 uppercase">Logout</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <section class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                <form id="txForm" class="space-y-4">
                    <input type="date" id="date" required class="w-full bg-slate-800 rounded-lg p-3 text-white">
                    <select id="category" required class="w-full bg-slate-800 rounded-lg p-3 text-white">
                        <option value="" disabled selected>Category</option>
                        <option value="Food">Food</option>
                        <option value="Bills">Bills</option>
                        <option value="Salary">Salary</option>
                    </select>
                    <input type="text" id="amount" placeholder="0.00" oninput="formatInputAmount(this)" required class="w-full bg-slate-800 rounded-lg p-3 text-white font-mono">
                    <select id="type" class="w-full bg-slate-800 rounded-lg p-3 text-white">
                        <option value="Expense">Expense</option>
                        <option value="Profit">Profit</option>
                    </select>
                    <button type="submit" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-black">Add Entry</button>
                </form>
            </section>

            <div class="lg:col-span-3 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800">
                        <p class="text-[10px] text-emerald-500 uppercase font-black">Net Balance</p>
                        <p id="statNet" class="text-2xl font-mono text-white mt-1">&#8369;0.00</p>
                    </div>
                </div>
                <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden h-64 overflow-y-auto">
                    <table class="w-full text-xs text-left">
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        
        // This ensures the currency sign is ALWAYS handled by the browser's engine
        const phFormat = new Intl.NumberFormat('en-PH', { 
            style: 'currency', 
            currency: 'PHP' 
        });

        // WAIT for the Firebase module to signal it is ready
        window.addEventListener('firebase-ready', () => {
            document.getElementById('loadingScreen').classList.add('hidden');
            const savedUser = localStorage.getItem('finance_user');
            if (savedUser) { 
                currentUser = savedUser; 
                enterDashboard(); 
            }
        });

        function enterDashboard() {
            localStorage.setItem('finance_user', currentUser);
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            initDataSync();
        }

        async function handleAuthAction() {
            const user = document.getElementById('authUsername').value.trim().toLowerCase();
            const pass = document.getElementById('authPass').value.trim();
            if(!user || !pass) return;

            // Using window.fb which was exported by the module
            const userRef = window.fb.ref(window.fb.db_fb, 'users/' + user);
            const snapshot = await window.fb.get(userRef);
            
            if (snapshot.exists() && snapshot.val().password === pass) {
                currentUser = user;
                enterDashboard();
            } else {
                alert("Access Denied");
            }
        }

        function initDataSync() {
            const txRef = window.fb.ref(window.fb.db_fb, `users/${currentUser}/transactions`);
            window.fb.onValue(txRef, (snapshot) => {
                const data = snapshot.val() || {};
                updateUI(data);
            });
        }

        function updateUI(data) {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            let total = 0;

            Object.values(data).forEach(item => {
                const amt = parseFloat(item.Amount);
                const isExp = item.Type === 'Expense';
                isExp ? total -= amt : total += amt;

                body.insertAdjacentHTML('afterbegin', `
                    <tr class="border-b border-slate-800/50">
                        <td class="p-4 text-slate-500">${item.Date}</td>
                        <td class="p-4 font-bold">${item.Category}</td>
                        <td class="p-4 text-right font-mono ${isExp ? 'text-rose-500' : 'text-emerald-400'}">
                            ${phFormat.format(amt)}
                        </td>
                    </tr>
                `);
            });
            document.getElementById('statNet').innerText = phFormat.format(total);
        }

        function formatInputAmount(input) {
            let val = input.value.replace(/[^0-9.]/g, '');
            input.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function handleLogout() {
            localStorage.removeItem('finance_user');
            location.reload();
        }

        document.getElementById('txForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const entry = {
                Date: document.getElementById('date').value,
                Category: document.getElementById('category').value,
                Amount: document.getElementById('amount').value.replace(/,/g, ''),
                Type: document.getElementById('type').value
            };
            await window.fb.push(window.fb.ref(window.fb.db_fb, `users/${currentUser}/transactions`), entry);
            e.target.reset();
        });
    </script>
</body>
</html>
